company_boundary:
  fengxing_scope:
    - 货主运输数字化
    - 车队数智化
    - 政府道路运输监管
    - 保险风控
    - 网络货运与运力生态
    - 商用车车后与新能源
    - 智驾和无人货运运营支持
    - 交通数据资产
  fengtu_sensitive_scope:
    - 通用地图服务
    - 地址/POI/AOI 数据
    - 智慧城市
    - 城市数字孪生
    - 高速公路感知
    - 政务地理信息
    - 通用空间智能体
  rule: 仅当与道路货运、运输运营、车队、安全、监管、保险、能源车后或交通数据商业化直接相关时，才纳入丰行研究。

