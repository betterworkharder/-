discovery_rules:
  local_beidou_operators:
    description: 地方北斗运营商不是单一企业，应按省市和项目持续发现、核验和建档。
    province_city_search_method:
      - "{省份} 北斗运营商 道路运输动态监管"
      - "{城市} 北斗车辆监控 两客一危一重"
      - "{省份} 重载普货 主动安全 车辆监控平台"
      - "{城市} 交通运输监管平台 运营服务商"
    government_procurement_search_method:
      - "{省份} 道路运输动态监管 政府采购 北斗"
      - "{城市} 车辆监控平台 政府采购 主动安全"
      - "site:ccgp.gov.cn {省份} 北斗 车辆监管"
      - "site:ccgp.gov.cn {城市} 道路运输 动态监管"
    tender_award_search_method:
      - "{省份} 北斗车辆监控 中标公告"
      - "{城市} 两客一危一重 主动安全 中标"
      - "{省份} 重载普货 车辆监管 平台 中标"
      - "{城市} 交通运输 监管平台 运维 中标"
    operation_platform_search_method:
      - "{省份} 道路运输车辆动态监管平台 运营"
      - "{城市} 北斗车辆监控平台 运维 服务商"
      - "{省份} 重点营运车辆 联网联控 运营商"
    new_entity_record_standard:
      required_fields:
        - 企业名称
        - 所在省市
        - 来源URL
        - 来源等级
        - 主要客户或采购方
        - 主要监管项目
        - 与政府部门关系
        - 项目规模或车辆类型
        - 是否涉及主动安全
        - 是否涉及保险或货运企业服务
        - 与丰行重叠的产品或市场
        - 建议关系类型
        - 待确认事项
      default_status: pending_confirmation
    long_term_watchlist_conditions:
      - 已通过A/B级来源确认企业主体和项目
      - 近24个月出现道路运输监管、北斗车辆监控或主动安全项目
      - 与丰行政府监管、车队安全、保险风控或货运企业服务存在明确重叠
      - 在同一省市具有持续运营、平台运维或多次中标记录
      - 人工确认后再加入 entities，默认先使用 regional_competitor 或 pending_confirmation

  additional_competitors:
    description: 其他后续发现对象不是实体，应作为发现规则维护。
    categories_to_scan:
      - TMS/OTMS厂商
      - 货主运输管理平台
      - 车队管理SaaS
      - 车联网和车辆定位服务商
      - 视频安全和主动安全厂商
      - 北斗运营商
      - 网络货运平台
      - 物流控制塔厂商
      - 运筹优化和智能调度厂商
      - 商用车保险科技公司
      - 新能源商用车运营平台
      - 车后服务平台
      - 自动驾驶货运企业
      - 海外车队管理平台
      - 大型物流企业自研科技平台
      - 政府交通监管平台服务商
    discovery_queries:
      zh:
        - TMS OTMS 运输管理 平台 中标
        - 车队管理 SaaS 商用车 安全 平台
        - 物流控制塔 智能调度 运输可视化
        - 商用车保险 风险减量 车联网
        - 自动驾驶卡车 运营平台 干线物流
        - 新能源重卡 车队 能源管理 平台
      en:
        - TMS OTMS transportation management startup freight visibility
        - fleet management SaaS video telematics commercial vehicle
        - logistics control tower route optimization dynamic dispatch
        - autonomous trucking operations platform commercial fleet
        - commercial auto insurance telematics risk reduction
    confirmation_rules:
      - 必须打开来源正文，确认企业名称、产品或项目、日期和来源等级。
      - 必须说明与丰行重叠的业务域、产品能力、客户类型或场景。
      - 必须区分直接竞争、局部竞争、技术竞争、平台竞争、标杆、生态伙伴、客户兼竞争者或潜在竞争者。
      - C级来源只能作为线索，不能单独建为长期观察实体。
      - 未经人工确认，不得将新发现企业列为 direct_competitor。
    long_term_watchlist_conditions:
      - 两次以上高相关事件，或一次A/B级来源确认的重大产品、客户、中标、融资、财报或政策相关事件。
      - 与丰行至少一个核心业务域高度重叠。
      - 能提供明确的实体名称、别名、产品、来源URL和初始关系判断。
      - 通过人工确认后再加入 entities。
